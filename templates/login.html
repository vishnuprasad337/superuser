<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hotel Login | Elegant Stays</title>
    <!-- Google Fonts & simple CSS reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* main card container */
        .login-container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* header branding */
        .login-header {
            background: #1e2a3e;
            padding: 2rem 2rem 1.8rem;
            color: white;
            text-align: center;
        }

        .login-header .icon-circle {
            background: rgba(255, 180, 71, 0.2);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-header .icon-circle i {
            font-size: 2.2rem;
            color: #ffb347;
        }

        .login-header h2 {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
        }

        .login-header p {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* form body */
        .login-body {
            padding: 2rem 2rem 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5b6e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            width: 18px;
            color: #ffb347;
            font-size: 0.85rem;
        }

        .input-group input {
            font-family: 'Inter', sans-serif;
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            background-color: #fefefe;
            transition: all 0.2s;
            outline: none;
            color: #1a2c3e;
        }

        .input-group input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.2);
        }

        .input-group input::placeholder {
            color: #b9c3cf;
            font-weight: 400;
        }

        /* button styling */
        .btn-login {
            background: #1e2a3e;
            border: none;
            width: 100%;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.25s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-login i {
            font-size: 1rem;
        }

        .btn-login:hover {
            background: #2c3e4e;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        /* extras & register link */
        .extras {
            margin-top: 1.8rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .register-link {
            background: #f1f5f9;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            color: #2d3e50;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .register-link i {
            font-size: 0.8rem;
        }

        .register-link:hover {
            background: #e6edf4;
            color: #1e2a3e;
            transform: translateX(2px);
        }

        .forgot-link {
            font-size: 0.8rem;
            color: #7f8c9a;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .forgot-link:hover {
            color: #ffb347;
        }

        /* error message card */
        .error-card {
            margin-top: 1.5rem;
            padding: 1rem 1.2rem;
            border-radius: 20px;
            background: #fee9e6;
            border-left: 6px solid #e67e22;
            color: #b33c1c;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .error-card i {
            font-size: 1.4rem;
        }

        hr {
            margin: 1.2rem 0 0.5rem;
            border: none;
            border-top: 1px solid #eef2f8;
        }

        .footer-note {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #9aaebf;
        }

        /* demo subtle animation */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            animation: fadeSlide 0.4s ease-out;
        }

        @media (max-width: 520px) {
            .login-body {
                padding: 1.6rem;
            }
            .extras {
                flex-direction: column;
                align-items: stretch;
            }
            .register-link, .forgot-link {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="icon-circle">
            <i class="fas fa-hotel"></i>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to manage your hotel dashboard</p>
    </div>

    <div class="login-body">
        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" placeholder="manager@hotel.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Login
            </button>
        </form>

        <!-- Error message with modern design -->
        {% if error %}
        <div class="error-card">
            <i class="fas fa-exclamation-triangle"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <hr>

        <div class="extras">
            <a href="#" class="forgot-link">
                <i class="fas fa-key"></i> Forgot password?
            </a>
            <a href="{% url 'hotel_register' %}" class="register-link">
                <i class="fas fa-user-plus"></i> New partner? Register hotel
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Secure login · Encrypted access
        </div>
    </div>
</div>

<!-- simple micro-interaction: focus glow already in css, nothing extra needed -->
</body>
</html>
