<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Modules | {{ hotel.hotel_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --navy: #0f1f3d;
            --blue: #1a56db;
            --blue-light: #3b82f6;
            --accent: #f59e0b;
            --green: #10b981;
            --red: #ef4444;
            --purple: #7c3aed;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --sidebar-w: 280px;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Sidebar Styles - Matching Dashboard */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
            scrollbar-width: thin;
        }

        .sidebar-brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: var(--blue);
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            font-size: 1.2rem;
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
        }

        .brand-sub {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.45);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            padding: 12px 10px 6px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            border-radius: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .menu-item i {
            width: 24px;
            font-size: 1rem;
            color: var(--blue-light);
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.08);
            color: white;
            transform: translateX(3px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
            color: white;
        }

        .menu-item.active i {
            color: white;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        /* Topbar */
        .topbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 28px;
            border-radius: 0 0 20px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(102,126,234,0.25);
        }

        .topbar-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .topbar-text h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            font-weight: 700;
            margin: 0;
        }

        .topbar-text p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            margin: 4px 0 0;
        }

        .hotel-name-pill {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Module Cards Container */
        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px 28px 28px;
        }

        .modules-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .selected-count {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .btn-clear {
            background: white;
            border: 1.5px solid var(--border);
            color: var(--red);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            background: var(--red);
            color: white;
            border-color: var(--red);
            transform: translateY(-2px);
        }

        /* Module Grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .module-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--blue-light);
        }

        .module-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
        }

        .module-card.selected::before {
            content: "✓";
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .module-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .module-icon i {
            font-size: 1.8rem;
            color: #667eea;
        }

        .module-card h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .module-card p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.4;
        }

        .module-badge {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.7rem;
            color: var(--text-light);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-light);
            opacity: 0.5;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Modal */
        .modal-content {
            border-radius: 16px;
            border: none;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0;
        }

        .modal-header .btn-close {
            background-color: white;
            opacity: 0.8;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid var(--border);
            padding: 10px 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        /* Buttons */
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 28px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.2s;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.4);
            color: white;
        }

        .btn-success-custom {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            padding: 12px 28px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.2s;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-success-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16,185,129,0.4);
            color: white;
        }

        .btn-outline-custom {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 24px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-outline-custom:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }

        .toast-custom {
            background: white;
            border-radius: 10px;
            padding: 12px 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
        }

        .toast-custom.success { border-left-color: #10b981; }
        .toast-custom.error { border-left-color: #ef4444; }
        .toast-custom.warning { border-left-color: #f59e0b; }
        .toast-custom.info { border-left-color: #3b82f6; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Mobile */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            background: var(--navy);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .wrap {
                padding: 0 15px 20px 15px;
            }
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggleBtn">
    <i class="fas fa-bars"></i>
</button>

<!-- Sidebar Navigation -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">
            <div class="brand-icon"><i class="fas fa-hotel"></i></div>
            <div>
                <div class="brand-name" id="sidebarHotelName">Hotel Name</div>
                <div class="brand-sub">Module Management</div>
            </div>
        </div>
    </div>
    
    <nav class="sidebar-nav">
        <div class="nav-label">MAIN NAVIGATION</div>
        <a href="{% url 'dashboard' %}" class="menu-item">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
        </a>
        <a href="/rooms/" class="menu-item">
            <i class="fas fa-bed"></i>
            <span>Room Management</span>
        </a>
        <a href="/staff/" class="menu-item">
            <i class="fas fa-users"></i>
            <span>Staff Management</span>
        </a>
        <a href="/modules/" class="menu-item active">
            <i class="fas fa-cubes"></i>
            <span>Hotel Modules</span>
        </a>
    </nav>
    
    <div class="sidebar-footer">
        <i class="fas fa-building me-1"></i> Hotel ERP System
    </div>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="topbar">
        <div class="topbar-icon">🏨</div>
        <div class="topbar-text">
            <h1>Hotel Modules</h1>
            <p>Select and manage services & features for your hotel</p>
        </div>
        <div class="hotel-name-pill">
            <i class="fas fa-hotel"></i> <strong id="hotelNameDisplay">Loading...</strong>
        </div>
    </div>

    <div class="wrap">
        <div class="modules-header">
            <div class="selected-count" id="selectedCountDisplay">
                <i class="fas fa-check-circle"></i>
                <span id="selectedCount">0</span> module(s) selected
            </div>
            <button class="btn-clear" onclick="clearAllSelections()">
                <i class="fas fa-trash-alt"></i> Clear All
            </button>
        </div>

        <div class="modules-grid" id="modulesContainer">
            <!-- Modules will be loaded dynamically -->
        </div>

        <div class="d-flex gap-3 flex-wrap">
            <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#moduleModal">
                <i class="fas fa-plus-circle"></i> Add Custom Module
            </button>
            <button class="btn-success-custom" onclick="saveSelectedModules()" id="saveBtn">
                <i class="fas fa-save"></i> Save & Continue
            </button>
        </div>
    </div>
</div>

<!-- Add Module Modal -->
<div class="modal fade" id="moduleModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i> Add Custom Module</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label fw-bold">Module Name</label>
                <input type="text" id="moduleName" class="form-control" placeholder="e.g., Swimming Pool, Spa, Restaurant, Gym">
                <small class="text-muted mt-2 d-block">Add a custom module that your hotel offers to guests</small>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-primary-custom" onclick="saveModule()" id="saveModuleBtn">
                    <i class="fas fa-save"></i> Add Module
                </button>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Global variables
let selectedModules = [];
let allModules = [];

// Toggle sidebar for mobile
const menuToggleBtn = document.getElementById('menuToggleBtn');
const sidebar = document.getElementById('sidebar');

if (menuToggleBtn && sidebar) {
    menuToggleBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        sidebar.classList.toggle('open');
    });
    
    document.addEventListener('click', function(e) {
        if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && e.target !== menuToggleBtn && !menuToggleBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        }
    });
}

// Show toast notification
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
    };
    toast.innerHTML = `
        <i class="fas ${icons[type]} me-2"></i>
        ${escapeHtml(message)}
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Get CSRF token
function getCSRFToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 'csrftoken='.length) === 'csrftoken=') {
                cookieValue = decodeURIComponent(cookie.substring('csrftoken='.length));
                break;
            }
        }
    }
    return cookieValue;
}

// Escape HTML
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Fetch hotel name
function fetchHotelName() {
    fetch("/get-amenities/")
        .then(res => res.json())
        .then(data => {
            if (data.hotel_name) {
                document.getElementById("hotelNameDisplay").textContent = data.hotel_name;
                document.getElementById("sidebarHotelName").textContent = data.hotel_name;
            }
        })
        .catch(err => console.log('Hotel name fetch failed:', err));
}

// Load modules from backend
function loadModules() {
    const container = document.getElementById("modulesContainer");
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Loading modules...</div>';
    
    fetch("/get-amenities/")
        .then(response => response.json())
        .then(data => {
            if (data.hotel_name) {
                document.getElementById("hotelNameDisplay").textContent = data.hotel_name;
                document.getElementById("sidebarHotelName").textContent = data.hotel_name;
            }
            
            allModules = data.amenities || [];
            
            if (allModules.length > 0) {
                container.innerHTML = '';
                
                // Module icons mapping
                const iconMap = {
                    'room': 'fa-bed',
                    'staff': 'fa-users',
                    'restaurant': 'fa-utensils',
                    'pool': 'fa-swimming-pool',
                    'swimming pool': 'fa-swimming-pool',
                    'gym': 'fa-dumbbell',
                    'spa': 'fa-spa',
                    'wifi': 'fa-wifi',
                    'parking': 'fa-parking',
                    'bar': 'fa-glass-martini-alt',
                    'conference': 'fa-chalkboard-user'
                };
                
                allModules.forEach(module => {
                    const moduleName = module.name.toLowerCase();
                    let icon = iconMap[moduleName] || 'fa-cube';
                    if (moduleName.includes('room')) icon = 'fa-bed';
                    if (moduleName.includes('staff')) icon = 'fa-users';
                    
                    const col = document.createElement('div');
                    col.className = 'module-card';
                    col.setAttribute('data-id', module.id);
                    col.setAttribute('data-name', module.name);
                    col.onclick = () => toggleModule(col);
                    
                    // Check if this module was previously selected
                    if (selectedModules.includes(String(module.id))) {
                        col.classList.add('selected');
                    }
                    
                    col.innerHTML = `
                        <div class="module-icon">
                            <i class="fas ${icon}"></i>
                        </div>
                        <h4>${escapeHtml(module.name)}</h4>
                        <p>Manage and configure ${escapeHtml(module.name)} services for your hotel</p>
                        <div class="module-badge">
                            <i class="fas fa-arrow-right"></i> Click to select
                        </div>
                    `;
                    container.appendChild(col);
                });
            } else {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-cubes"></i>
                        <p>No modules added yet.<br>Click "Add Custom Module" to get started!</p>
                    </div>
                `;
            }
            
            updateSelectedCount();
        })
        .catch(error => {
            console.error('Error loading modules:', error);
            container.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>Failed to load modules. Please refresh the page.</p>
                </div>
            `;
            showToast("Failed to load modules", "error");
        });
}

// Toggle module selection
function toggleModule(element) {
    element.classList.toggle("selected");
    const id = element.getAttribute("data-id");
    
    if (selectedModules.includes(id)) {
        selectedModules = selectedModules.filter(x => x !== id);
        showToast(`Module deselected`, "info");
    } else {
        selectedModules.push(id);
        const name = element.getAttribute("data-name");
        showToast(`✓ "${name}" module selected`, "success");
    }
    
    updateSelectedCount();
}

// Update selected count display
function updateSelectedCount() {
    const count = selectedModules.length;
    document.getElementById('selectedCount').textContent = count;
    const display = document.getElementById('selectedCountDisplay');
    
    if (count > 0) {
        display.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
        display.innerHTML = `<i class="fas fa-check-circle"></i> ${count} module${count === 1 ? '' : 's'} selected`;
    } else {
        display.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        display.innerHTML = `<i class="fas fa-check-circle"></i> ${count} modules selected`;
    }
}

// Clear all selections
function clearAllSelections() {
    if (confirm('Clear all selected modules?')) {
        selectedModules = [];
        document.querySelectorAll('.module-card.selected').forEach(card => {
            card.classList.remove('selected');
        });
        updateSelectedCount();
        showToast('All selections cleared', 'info');
    }
}

// Save new module
function saveModule() {
    const nameInput = document.getElementById("moduleName");
    const name = nameInput.value.trim();
    
    if (!name) {
        showToast("Please enter a module name", "error");
        return;
    }
    
    const saveBtn = document.getElementById('saveModuleBtn');
    const originalText = saveBtn.innerHTML;
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="loading-spinner"></span> Adding...';
    
    fetch("/add-amenity/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ name: name })
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            showToast(data.error, "error");
            return;
        }
        
        // Check if module already exists in UI
        if (document.querySelector(`.module-card[data-id='${data.id}']`)) {
            showToast(`Module "${name}" already exists!`, "warning");
            nameInput.value = "";
            const modal = bootstrap.Modal.getInstance(document.getElementById('moduleModal'));
            modal.hide();
            return;
        }
        
        // Reload modules to show the new one
        loadModules();
        
        // Auto select the new module
        selectedModules.push(String(data.id));
        updateSelectedCount();
        
        showToast(`✓ "${data.name}" module added and selected!`, "success");
        
        nameInput.value = "";
        const modal = bootstrap.Modal.getInstance(document.getElementById('moduleModal'));
        modal.hide();
    })
    .catch(error => {
        console.error('Error:', error);
        showToast("Failed to save module", "error");
    })
    .finally(() => {
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalText;
    });
}

// Save selected modules and redirect
function saveSelectedModules() {
    if (selectedModules.length === 0) {
        showToast("Please select at least one module before continuing", "warning");
        return;
    }
    
    const saveBtn = document.getElementById('saveBtn');
    const originalText = saveBtn.innerHTML;
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="loading-spinner"></span> Saving...';
    
    fetch("/save-selected-amenities/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            amenities: selectedModules
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast(`✓ Saved ${data.saved_count} module(s)! Redirecting...`, "success");
            setTimeout(() => {
                window.location.href = "/dashboard/";
            }, 1000);
        } else {
            showToast(data.error || "Error saving modules", "error");
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalText;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast("Something went wrong. Please try again.", "error");
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalText;
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    fetchHotelName();
    loadModules();
});
</script>
