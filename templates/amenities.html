<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Amenities | Hotel Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
        }

        .amenities-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            border-bottom: none;
        }

        .card-header h3 {
            margin: 0;
            font-weight: 600;
        }

        .card-header p {
            margin: 10px 0 0;
            opacity: 0.9;
        }

        .card-body {
            padding: 30px;
        }

        .amenity-item {
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .amenity-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .amenity-item.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            color: #667eea;
        }

        .amenity-item.active::before {
            content: "✓";
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .btn-custom-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
            transition: transform 0.2s;
            color: white;
        }

        .btn-custom-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
            color: white;
        }

        .btn-custom-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 10px;
            color: white;
        }

        .btn-custom-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17,153,142,0.4);
            color: white;
        }

        .selected-count {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #ddd;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card-body {
                padding: 20px;
            }
            .amenity-item {
                padding: 10px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="amenities-card">
        <div class="card-header">
            <h3><i class="fas fa-concierge-bell"></i> Select Hotel Amenities</h3>
            <p>Add and choose amenities that your hotel offers to guests</p>
        </div>
        
        <div class="card-body">
            <div class="mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div class="selected-count" id="selectedCountDisplay">
                    <i class="fas fa-check-circle"></i> <span id="selectedCount">0</span> amenities selected
                </div>
                <div>
                    <button class="btn btn-outline-danger btn-sm" onclick="clearAllSelections()">
                        <i class="fas fa-trash-alt"></i> Clear All
                    </button>
                </div>
            </div>

            <div class="row" id="amenities-container">
                <!-- Amenities will be loaded dynamically -->
            </div>

            <div class="mt-4 d-flex gap-3 flex-wrap">
                <button class="btn btn-custom-primary" data-bs-toggle="modal" data-bs-target="#amenityModal">
                    <i class="fas fa-plus-circle"></i> Add New Amenity
                </button>
                <button class="btn btn-custom-success" onclick="submitAmenities()" id="continueBtn">
                    <i class="fas fa-arrow-right"></i> Continue to Dashboard
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Add Amenity Modal -->
<div class="modal fade" id="amenityModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle"></i> Add New Amenity</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <label class="form-label fw-bold">Amenity Name</label>
                <input type="text" id="amenityName" class="form-control" placeholder="e.g., Swimming Pool, Free WiFi, Spa, Gym">
                <small class="text-muted mt-2 d-block">Click Save to add this amenity to your hotel</small>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveAmenity()" id="saveAmenityBtn">Save Amenity</button>
            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-notification"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Global variables
let selectedAmenities = [];

// Load amenities from backend on page load
function loadAmenities() {
    fetch("/get-amenities/")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("amenities-container");
            container.innerHTML = '';
            
            if (data.amenities && data.amenities.length > 0) {
                data.amenities.forEach(amenity => {
                    const col = document.createElement('div');
                    col.className = 'col-md-4 col-lg-3 mb-3';
                    col.innerHTML = `
                        <div class="amenity-item" 
                             onclick="toggleAmenity(this)" 
                             data-id="${amenity.id}"
                             data-name="${escapeHtml(amenity.name)}">
                            <i class="fas fa-check-circle me-2"></i>
                            ${escapeHtml(amenity.name)}
                        </div>
                    `;
                    container.appendChild(col);
                });
            } else {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="empty-state">
                            <i class="fas fa-plus-circle"></i>
                            <p>No amenities added yet.<br>Click "Add New Amenity" to get started!</p>
                        </div>
                    </div>
                `;
            }
        })
        .catch(error => {
            console.error('Error loading amenities:', error);
            showToast("Failed to load amenities", "error");
        });
}

// Show toast notification
function showToast(message, type = 'success') {
    const toastContainer = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `alert alert-${type === 'success' ? 'success' : 'danger'} alert-dismissible fade show`;
    toast.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
    toast.style.color = type === 'success' ? '#155724' : '#721c24';
    toast.style.borderLeft = `4px solid ${type === 'success' ? '#28a745' : '#dc3545'}`;
    toast.style.padding = '12px 20px';
    toast.style.marginBottom = '10px';
    toast.style.borderRadius = '8px';
    toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>
        ${message}
        <button type="button" class="btn-close float-end" data-bs-dismiss="alert" style="font-size: 10px;"></button>
    `;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Toggle amenity selection
function toggleAmenity(element) {
    element.classList.toggle("active");
    let id = element.getAttribute("data-id");
    
    if (selectedAmenities.includes(id)) {
        selectedAmenities = selectedAmenities.filter(x => x !== id);
    } else {
        selectedAmenities.push(id);
    }
    
    updateSelectedCount();
}

// Update selected count display
function updateSelectedCount() {
    const count = selectedAmenities.length;
    document.getElementById('selectedCount').textContent = count;
    const display = document.getElementById('selectedCountDisplay');
    if (count > 0) {
        display.style.background = '#28a745';
        display.innerHTML = `<i class="fas fa-check-circle"></i> ${count} amenit${count === 1 ? 'y' : 'ies'} selected`;
    } else {
        display.style.background = '#667eea';
        display.innerHTML = `<i class="fas fa-check-circle"></i> ${count} amenities selected`;
    }
}

// Clear all selections
function clearAllSelections() {
    if (confirm('Clear all selected amenities?')) {
        selectedAmenities = [];
        document.querySelectorAll('.amenity-item.active').forEach(item => {
            item.classList.remove('active');
        });
        updateSelectedCount();
        showToast('All selections cleared', 'info');
    }
}

// Get CSRF token
function getCSRFToken() {
    let cookieValue = null;
    document.cookie.split(';').forEach(cookie => {
        let c = cookie.trim();
        if (c.startsWith('csrftoken=')) {
            cookieValue = c.substring('csrftoken='.length);
        }
    });
    return cookieValue;
}

// Save new amenity
function saveAmenity() {
    const nameInput = document.getElementById("amenityName");
    const name = nameInput.value.trim();
    
    if (!name) {
        showToast("Please enter an amenity name", "error");
        return;
    }
    
    const saveBtn = document.getElementById('saveAmenityBtn');
    const originalText = saveBtn.innerHTML;
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="loading"></span> Saving...';
    
    fetch("/add-amenity/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ name: name })
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            showToast(data.error, "error");
            return;
        }
        
        // Check if amenity already exists in UI
        if (document.querySelector(`.amenity-item[data-id='${data.id}']`)) {
            showToast(`Amenity "${name}" already exists!`, "warning");
            nameInput.value = "";
            const modal = bootstrap.Modal.getInstance(document.getElementById('amenityModal'));
            modal.hide();
            return;
        }
        
        // Reload amenities to show the new one
        loadAmenities();
        
        // Auto select the new amenity
        selectedAmenities.push(String(data.id));
        updateSelectedCount();
        
        showToast(`✓ "${data.name}" added and selected!`, "success");
        
        nameInput.value = "";
        const modal = bootstrap.Modal.getInstance(document.getElementById('amenityModal'));
        modal.hide();
    })
    .catch(error => {
        console.error('Error:', error);
        showToast("Failed to save amenity", "error");
    })
    .finally(() => {
        saveBtn.disabled = false;
        saveBtn.innerHTML = originalText;
    });
}

// Escape HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Submit selected amenities and redirect to dashboard
function submitAmenities() {
    if (selectedAmenities.length === 0) {
        showToast("Please select at least one amenity before continuing", "warning");
        return;
    }
    
    const submitBtn = document.getElementById('continueBtn');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading"></span> Saving...';
    
    console.log('Submitting amenities:', selectedAmenities);
    
    fetch("/save-selected-amenities/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            amenities: selectedAmenities
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showToast(`✓ Saved ${data.saved_count} amenities! Redirecting...`, "success");
            setTimeout(() => {
                window.location.href = "/dashboard/";
            }, 1000);
        } else {
            showToast(data.error || "Error saving amenities", "error");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showToast("Something went wrong", "error");
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    loadAmenities();
    updateSelectedCount();
});
</script>

</body>
</html>
